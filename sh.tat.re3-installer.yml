---
id: sh.tat.re3-installer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: re3-installer
finish-args:
  - --filesystem=home
  - --device=all
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/aclocal
  - /share/doc
  - /share/man
  - /share/pkgconfig
  - '*.a'
  - '*.la'
modules:
  - name: libcdio
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/libcdio/libcdio/releases/download/2.3.0/libcdio-2.3.0.tar.gz
        sha256: 37bcb13296febbcff9dc4485834bac09212cb463c31fcea52f70ee1dd3a5a5de
  - name: libcdio-paranoia
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/libcdio/libcdio-paranoia-10.2+2.0.2.tar.bz2
        sha256: 169c44607ed6e09db1ed8761b83cb1f82cdcd80d0aaccd76e0afe93dffeeb466
  - name: libunshield
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/twogood/unshield.git
        tag: 1.6.2
  - name: re3-installer
    builddir: true
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/Tatsh/re3-installer.git
        tag: v0.2.3
        x-checker-data:
          type: git
          tag-pattern: '^v([\d.]+)$'
